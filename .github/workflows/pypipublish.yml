name: Publish
on:
  push:
    tags:
      - "*/v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to build"
        required: true
        type: choice
        options:
          - vsview
          - vspackrgb
          - audio-convert
          - comp
          - fftspectrum
          - frameprops-extended
          - split-planes

env:
  VSVIEW_PYTHON_VERSION: "3.14"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.check.outputs.matrix }}
      is-vspackrgb: ${{ steps.check.outputs.is-vspackrgb }}
      python-version: ${{ env.VSVIEW_PYTHON_VERSION }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        run: python .github/scripts/resolve_package.py
        env:
          INPUT_PACKAGE: ${{ inputs.package }}

  # Build Jobs
  python-build:
    needs: [prepare]
    if: needs.prepare.outputs.matrix != '[]'
    uses: ./.github/workflows/cd-build-python.yml
    with:
      matrix: ${{ needs.prepare.outputs.matrix }}
      python-version: ${{ needs.prepare.outputs.python-version }}

  vspackrgb-build:
    needs: [prepare]
    if: needs.prepare.outputs.is-vspackrgb == 'true'
    uses: ./.github/workflows/cd-build-vspackrgb.yml
    with:
      python-version: ${{ needs.prepare.outputs.python-version }}

  # Publish Jobs
  python-publish:
    name: Publish ${{ matrix.package }} to PyPI
    needs: [prepare, python-build]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}

    environment:
      name: pypi-${{ matrix.package }}
      url: https://pypi.org/p/${{ matrix.package }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ matrix.package }}
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Post webhook for failure
        if: failure()
        uses: Jaded-Encoding-Thaumaturgy/discord-failure-notifier@v1
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}

  vspackrgb-publish:
    name: Publish vspackrgb to PyPI
    needs: [prepare, vspackrgb-build]
    if: needs.prepare.outputs.is-vspackrgb == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    environment:
      name: pypi-vspackrgb
      url: https://pypi.org/p/vspackrgb

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.VSVIEW_PYTHON_VERSION }}
          enable-cache: false

      - name: Check the output
        run: uvx twine check --strict dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Post webhook for failure
        if: failure()
        uses: Jaded-Encoding-Thaumaturgy/discord-failure-notifier@v1
        with:
          webhook-url: ${{ secrets.WEBHOOK_URL }}
