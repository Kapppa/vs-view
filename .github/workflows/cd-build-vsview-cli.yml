name: Build vsview-cli
on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"

jobs:
  wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Build sdist
        if: matrix.os == 'macos-latest'
        run: uv build --package vsview-cli --sdist --out-dir dist --clear

      - name: Upload sdist
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sdist
          path: dist/*.tar.gz

      - name: Build wheels
        uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4
        with:
          package-dir: src/vsview-cli
          output-dir: wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
