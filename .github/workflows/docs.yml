name: Doc

on:
  push:
    branches:
      - main
    tags:
      - "vsview/v*"

permissions:
  contents: write

env:
  UV_NO_SYNC: "1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --only-group doc --no-install-workspace

      - name: Patch VapourSynth inventory
        run: uv run python scripts/fix_vs_inv.py

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/vsview/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/vsview/}
            echo "path=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "path=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build docs
        run: uv run zensical build --clean

      - name: Create root redirect
        run: |
          mkdir -p _deploy
          cp -r site/* _deploy/
          mkdir -p _deploy/${{ steps.version.outputs.path }}
          cp -r site/* _deploy/${{ steps.version.outputs.path }}/
          cat > _deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head><meta http-equiv="refresh" content="0; url=latest/"></head>
            <body><a href="latest/">Redirecting to latest...</a></body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _deploy
          branch: gh-pages
          clean: false
