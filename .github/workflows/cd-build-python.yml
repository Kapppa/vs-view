name: Build Python
on:
  workflow_call:
    inputs:
      matrix:
        required: true
        type: string
      python-version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      matrix:
        required: true
        type: string
        default: '[{"tag": "vsview", "package": "vsview", "path": ".", "build_args": "--sdist --wheel"}]'
        description: |
          JSON output from resolve_package.py

          Examples:

          - [{"tag": "vsview", "package": "vsview", "path": ".", "build_args": "--sdist --wheel"}]
          - [{"tag": "comp", "package": "vsview-comp", "path": "src/plugins/comp", "build_args": "--wheel"}]
      python-version:
        required: false
        type: string
        default: "3.14"

jobs:
  build:
    name: Build ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJson(inputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ inputs.python-version }}
          enable-cache: true

      - name: Build
        run: uv build --package "${{ matrix.package }}" ${{ matrix.build_args }} --out-dir dist --clear

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-${{ matrix.package }}
          path: dist/
